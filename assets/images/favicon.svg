<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Speedometer arc (~210 degrees, from lower-left to lower-right) -->
  <path
    d="M 6.5 22 A 11 11 0 1 1 25.5 22"
    stroke="#F5A623"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Tick marks -->
  <line x1="7" y1="14" x2="9" y2="15.2" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="5" x2="16" y2="7.5" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="14" x2="23" y2="15.2" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Needle pointing to upper-right (~75% of max) -->
  <line x1="16" y1="19" x2="22" y2="10" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
  <!-- Center pivot dot -->
  <circle cx="16" cy="19" r="2.5" fill="#F5A623"/>
</svg>
